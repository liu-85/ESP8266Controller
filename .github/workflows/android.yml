name: Android CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Build Version (e.g. 1.2.3, defaults to date)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: 17

    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew

    - name: Run tests and Lint
      run: ./gradlew test lintDebug --stacktrace

    - name: Set Version
      run: |
        VERSION_NAME="${{ github.event.inputs.version_name }}"
        if [ -z "$VERSION_NAME" ]; then
          VERSION_NAME=$(date +'%Y%m%d')
        fi
        echo "BUILD_VERSION=$VERSION_NAME" >> $GITHUB_ENV
        # Optionally update version in build.gradle
        sed -i "s/versionName \".*\"/versionName \"$VERSION_NAME\"/" app/build.gradle

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: esp8266-controller-debug
        path: app/build/outputs/apk/debug/*.apk

    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        files: app/build/outputs/apk/debug/*.apk
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        body: |
          RC遥控器 最新构建版本
          - 修复了 UI 遮挡问题
          - 优化了 Wi-Fi 连接协议匹配 (SS2 协议)
          - 增加了自动连接逻辑
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}