name: Android CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: 17

    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew

    - name: Build with Gradle
      shell: bash
      run: |
        set -o pipefail
        if ! ./gradlew build --stacktrace --console=plain 2>&1 | tee build.log; then
          echo "---- Kotlin diagnostics (lines starting with e:) ----"
          grep '^e:' build.log | head -n 60 || true
          exit 1
        fi

    - name: Run unit tests
      run: ./gradlew test --stacktrace